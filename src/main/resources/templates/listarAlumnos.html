<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container mt-5"><br>
    <h1>Listado de Alumnos</h1>
    <a th:href="@{/alumnos/form}" class="btn btn-success mb-3">Crear Alumno</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th><a class="btn btn-danger btn-xs float-right mx-2" th:href="@{ver(format=pdf)}">PDF</a></th>
            <th><a class="btn btn-success btn-xs float-right" th:href="@{ver(format=xlsx)}">XLS</a></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="alumno : ${alumnos}">
            <td th:text="${alumno.id}"></td>
            <td th:text="${alumno.nombre}"></td>
            <td th:text="${alumno.apellido}"></td>
            <td th:text="${alumno.email}"></td>
            <td th:text="${alumno.telefono}"></td>
            <td>
                <a th:href="@{/alumnos/form/{id}(id=${alumno.id})}" class="btn btn-primary">Editar</a>

            </td>
            <td>
                <a th:href="@{/alumnos/eliminar/{id}(id=${alumno.id})}" class="btn btn-danger"
                   onclick="return confirm('¿Estás seguro de eliminar?')">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
