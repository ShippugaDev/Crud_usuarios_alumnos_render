<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear/Editar Alumno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container mt-5"><br>
    <h1 th:if="${alumno.id == null}">Crear Alumno</h1>
    <h1 th:if="${alumno.id != null}">Editar Alumno</h1>

    <form th:action="@{/alumnos/form}" th:object="${alumno}" method="post">
        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" th:field="*{nombre}" id="nombre" class="form-control" placeholder="Nombre">
        </div>
        <div class="form-group">
            <label for="apellido">Apellido</label>
            <input type="text" th:field="*{apellido}" id="apellido" class="form-control" placeholder="Apellido">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" th:field="*{email}" id="email" class="form-control" placeholder="Email">
        </div>
        <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="text" th:field="*{telefono}" id="telefono" class="form-control" placeholder="Teléfono">
        </div>
        <button type="submit" class="btn btn-primary mt-3">Guardar</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
